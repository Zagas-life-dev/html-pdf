<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML → PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #121212;
    --line: #2a2a2a;
    --text: #e8e6e1;
    --muted: #6f6f6f;
    --accent: #d4ff3f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1.5px solid var(--line);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    margin: 0;
    color: var(--text);
  }

  .brand .arrow {
    color: var(--accent);
    font-size: 22px;
  }

  .brand .sub {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  select, button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 9px 14px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }

  select:hover, button:hover {
    border-color: var(--muted);
  }

  #downloadBtn {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 700;
  }

  #downloadBtn:hover {
    background: #c2eb2c;
    border-color: #c2eb2c;
  }

  #downloadBtn:disabled {
    opacity: 0.5;
    cursor: default;
    background: var(--accent);
    border-color: var(--accent);
  }

  select {
    background: var(--surface);
  }

  /* ---------- Main split ---------- */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pane-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
  }

  .pane-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 8px;
  }

  #editorPane {
    border-right: 1.5px solid var(--line);
  }

  textarea#codeInput {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 20px;
    tab-size: 2;
  }

  textarea#codeInput::placeholder {
    color: var(--muted);
  }

  #previewPane {
    background: var(--surface);
  }

  .preview-wrap {
    flex: 1;
    position: relative;
    background: #1c1c1c;
    overflow: auto;
    padding: 24px;
    display: flex;
    justify-content: center;
  }

  #previewFrame {
    width: 100%;
    max-width: 800px;
    height: fit-content;
    min-height: 600px;
    background: #ffffff;
    border: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .filetag {
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
    margin-left: 4px;
  }

  textarea#codeInput.dragover {
    background: #16190a;
    outline: 1.5px dashed var(--accent);
    outline-offset: -8px;
  }

  @media (max-width: 860px) {
    main { flex-direction: column; }
    #editorPane { border-right: none; border-bottom: 1.5px solid var(--line); }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>HTML<span class="arrow">→</span>PDF</h1>
    <span class="sub">paste. preview. export.</span>
  </div>
  <div class="actions">
    <input type="file" id="fileInput" accept=".html,.htm,text/html" hidden>
    <button id="uploadBtn">↑ Upload HTML</button>
    <select id="pageSize">
      <option value="a4">A4</option>
      <option value="letter">Letter</option>
      <option value="legal">Legal</option>
    </select>
    <button id="downloadBtn">↓ Download PDF</button>
  </div>
</header>

<main>
  <div class="pane" id="editorPane">
    <div class="pane-label"><span><span class="dot"></span>SOURCE <span id="fileName" class="filetag"></span></span><span class="hint" id="charCount">0 chars</span></div>
    <textarea id="codeInput" spellcheck="false" placeholder="Paste your HTML here, or drag & drop a .html file...

<h1>Hello world</h1>
<p>This will render live on the right, and export to a real PDF.</p>"></textarea>
  </div>

  <div class="pane" id="previewPane">
    <div class="pane-label"><span><span class="dot"></span>LIVE PREVIEW</span><span class="hint">renders as you type</span></div>
    <div class="preview-wrap">
      <iframe id="previewFrame"></iframe>
    </div>
  </div>
</main>

<script>
  const codeInput = document.getElementById('codeInput');
  const previewFrame = document.getElementById('previewFrame');
  const charCount = document.getElementById('charCount');
  const downloadBtn = document.getElementById('downloadBtn');
  const pageSize = document.getElementById('pageSize');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileInput = document.getElementById('fileInput');
  const fileNameTag = document.getElementById('fileName');

  const DEFAULT_HTML = `<div style="font-family: Georgia, serif; padding: 40px; color: #1a1a1a;">
  <h1 style="margin-bottom: 4px;">Sample Document</h1>
  <p style="color:#666; margin-top:0;">Edit the code on the left — this updates live.</p>
  <hr style="border: none; border-top: 1px solid #ddd; margin: 24px 0;">
  <p>This preview renders in a real iframe, so your CSS (including inline styles, &lt;style&gt; blocks, and most layouts) behaves the way it would in a browser. When you're happy with it, hit <strong>Download PDF</strong> in the top right.</p>
  <ul>
    <li>Paste any HTML snippet or full page</li>
    <li>Preview updates as you type</li>
    <li>Export renders the current preview to a paginated PDF</li>
  </ul>
</div>`;

  function renderPreview() {
    const html = codeInput.value;
    const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
    doc.open();
    doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
      body { margin:0; font-family: Helvetica, Arial, sans-serif; }
    </style></head><body>${html}</body></html>`);
    doc.close();

    // Resize iframe to fit content height
    requestAnimationFrame(() => {
      try {
        const body = doc.body;
        const height = Math.max(body.scrollHeight, 600);
        previewFrame.style.height = height + 'px';
      } catch (e) {}
    });

    charCount.textContent = html.length + ' chars';
  }

  codeInput.addEventListener('input', renderPreview);

  function loadFile(file) {
    if (!file) return;
    const isHtml = /\.html?$/i.test(file.name) || file.type === 'text/html';
    if (!isHtml) {
      alert('Please choose an .html or .htm file.');
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      codeInput.value = e.target.result;
      fileNameTag.textContent = '— ' + file.name;
      renderPreview();
    };
    reader.onerror = () => alert('Could not read that file.');
    reader.readAsText(file);
  }

  // Upload button -> hidden file input
  uploadBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    loadFile(e.target.files[0]);
    fileInput.value = ''; // allow re-uploading the same file later
  });

  // Drag & drop directly onto the editor
  codeInput.addEventListener('dragover', (e) => {
    e.preventDefault();
    codeInput.classList.add('dragover');
  });
  codeInput.addEventListener('dragleave', () => {
    codeInput.classList.remove('dragover');
  });
  codeInput.addEventListener('drop', (e) => {
    e.preventDefault();
    codeInput.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    loadFile(file);
  });

  downloadBtn.addEventListener('click', () => {
    const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
    const target = doc.body;

    if (!target || !target.innerHTML.trim()) {
      alert('Paste some HTML first.');
      return;
    }

    downloadBtn.disabled = true;
    downloadBtn.textContent = 'Rendering…';

    const opt = {
      margin: 10,
      filename: 'export.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
      jsPDF: { unit: 'mm', format: pageSize.value, orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    html2pdf().set(opt).from(target).save().then(() => {
      downloadBtn.disabled = false;
      downloadBtn.textContent = '↓ Download PDF';
    }).catch(() => {
      downloadBtn.disabled = false;
      downloadBtn.textContent = '↓ Download PDF';
      alert('Something went wrong rendering the PDF. Try simplifying the HTML.');
    });
  });

  // Init
  codeInput.value = DEFAULT_HTML;
  renderPreview();
</script>

</body>
</html>
